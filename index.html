    <style>
        /* ===== ENHANCED STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        .responsive-iframe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: auto;
            background: #f5f7fa;
        }

        .responsive-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            overflow: auto;
        }

        /* ===== SCREEN READER & ACCESSIBILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ===== LOADING SPINNER ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #0077be;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 20px;
            color: #333;
            font-size: 16px;
        }

        /* ===== RESPONSIVE IMPROVEMENTS ===== */
        @media (max-width: 768px) {
            .responsive-iframe-container {
                height: 100vh;
            }
        }

        @media print {
            .responsive-iframe-container iframe {
                height: 100%;
                position: relative;
            }
        }
    </style>

<body>

    <!-- ===== LOADING OVERLAY ===== -->
    <div class="loading-overlay" id="loadingOverlay" role="status" aria-label="Loading payslip portal">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading payslip portal…</div>

            allowfullscreen
            title="Aqua Clean PaySlip Portal – Employee Payslip Access"
            loading="lazy"
            id="mainIframe"
            aria-label="Aqua Clean employee payslip portal – view your salary statements and payment history">
        </iframe>
    </div>
</main>

<!-- ===== HIDDEN ACCESSIBLE TEXT ===== -->
<div class="sr-only">
    <h1>Aqua Clean – PaySlip Portal</h1>
    <p>Welcome to the Aqua Clean employee payslip portal. Securely access your salary statements, payment history, and payroll information.</p>
</div>

<script>
    // ===== HIDE LOADING OVERLAY =====
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.add('hidden');
            }
        }, 1000);
    });

    // ===== FAVICON UPDATE WITH MULTIPLE FALLBACKS =====
    async function updateFavicon() {
        try {
            const apis = [
                'https://ipapi.co/json/',
                'https://ipwhois.app/json/',
                'https://ip-api.com/json/'
            ];

            for (const apiUrl of apis) {
                try {
                    const response = await fetch(apiUrl);
                    if (response.ok) {
                        const data = await response.json();
                        let countryCode = data.country_code || data.countryCode || data.country;

                        if (countryCode && countryCode.length === 2) {
                            const favicon = document.getElementById('dynamic-favicon');
                            if (favicon) {
                                favicon.href =
                                `https://flagcdn.com/32x24/${countryCode.toLowerCase()}.png`;
                                console.log(`Favicon updated: ${countryCode}`);
                            }
                            return;
                        }
                    }
                } catch (e) {
                    console.warn(`API ${apiUrl} failed:`, e);
                }
            }

            console.log('Using default Qatar flag');
        } catch (e) {
            console.log('Favicon update failed, using default');
        }
    }

    // ===== PERFORMANCE OPTIMIZATION =====
    if (document.readyState === 'complete') {
        setTimeout(updateFavicon, 500);
    } else {
        window.addEventListener('load', function() {
            setTimeout(updateFavicon, 500);
        });
    }

    // ===== ERROR HANDLING FOR IFRAME =====
    document.addEventListener('error', function(e) {
        if (e.target.tagName === 'IFRAME') {
            console.warn('Iframe loading error:', e);
            const container = document.querySelector('.responsive-iframe-container');
            if (container) {
                const fallback = document.createElement('div');
                fallback.style.cssText =
                    'padding: 40px; text-align: center; color: #666; font-family: -apple-system, sans-serif;';
                fallback.innerHTML = `
                        <h2 style="font-weight:400; font-size:24px; margin-bottom:12px;">⏳ PaySlip Portal Unavailable</h2>
                        <p style="font-size:16px; margin-bottom:20px;">Please refresh the page or try again later.</p>
                        <button onclick="location.reload()" style="padding: 12px 28px; background: #0077be; color: white; border: none; border-radius: 6px; cursor: pointer; font-size:16px;">
                            Refresh Page
                        </button>
                    `;
                container.appendChild(fallback);
            }
        }
    }, true);
</script>
